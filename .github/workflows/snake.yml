name: generate snake animation

on:
  # regenerate automatically every 24 hours
  schedule:
    - cron: "0 */24 * * *"
  # allows manually running the job any time from the Actions tab
  workflow_dispatch:
  # regenerate whenever you push to main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # pulls your contribution graph and generates the snake animation as svg
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # pushes the generated svg(s) to the "output" branch
      # they'll be available at https://raw.githubusercontent.com/<user>/<repo>/output/<file>
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
